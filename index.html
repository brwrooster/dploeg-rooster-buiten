<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Ploeg Buiten</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.production.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f12; color: #e8e6e1; overflow-x: hidden; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const HUIDI_TEAM = "buiten";
        const API_BASE = window.ROOSTER_API_BASE || "https://dploeg-rooster.richard-bos.workers.dev";

        const FUNCTIE_ORDER = ["B", "M", "CTS", "CL", "OL"];
        const FUNCTIE_LABELS = { B: "Bevelvoerder", M: "Machinist", CTS: "CTS", CL: "Chauffeur Ladderwagen", OL: "Operationeel Leider" };
        const FUNCTIE_KLEUREN = { B: "#3b82f6", M: "#10b981", CTS: "#f59e0b", CL: "#ef4444", OL: "#8b5cf6" };
        const REINIGING_PER_DAG = { 0: ["keuken", "opstelplaats"], 1: ["keuken"], 2: ["keuken"], 3: ["keuken", "kantoor"], 4: ["keuken"], 5: ["kantoor"], 6: [] };
        const WEER_API = "https://api.open-meteo.com/v1/forecast?latitude=52.3&longitude=5.15&daily=weather_code,temperature_2m_max,precipitation&timezone=Europe/Amsterdam";

        function useApi() {
            const [token, setToken] = React.useState(() => sessionStorage.getItem("rooster_token") || null);
            const call = React.useCallback(async (path, opts = {}) => {
                const headers = { 
                    "Content-Type": "application/json",
                    "X-Team": HUIDI_TEAM
                };
                if (token) headers["Authorization"] = "Bearer " + token;
                const res = await fetch(API_BASE + path, { ...opts, headers });
                if (res.status === 401) {
                    setToken(null);
                    sessionStorage.removeItem("rooster_token");
                    throw new Error("Sessie verlopen. Log opnieuw in.");
                }
                return res.json();
            }, [token]);
            return { token, setToken, call };
        }

        function LoginScreen({ api, onSuccess }) {
            const [gebruikersnaam, setGebruikersnaam] = React.useState("");
            const [wachtwoord, setWachtwoord] = React.useState("");
            const [error, setError] = React.useState("");
            const handleLogin = async (e) => {
                e.preventDefault();
                try {
                    const res = await api.call("/api/login", {
                        method: "POST",
                        body: JSON.stringify({ gebruikersnaam, wachtwoord }),
                    });
                    if (res.token) {
                        sessionStorage.setItem("rooster_token", res.token);
                        api.setToken(res.token);
                        onSuccess();
                    } else {
                        setError(res.error || "Login mislukt");
                    }
                } catch (err) {
                    setError(err.message);
                }
            };
            return (
                <div style={{ minHeight: "100vh", background: "#101216", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" }}>
                    <div style={{ width: "100%", maxWidth: "400px" }}>
                        <h1 style={{ textAlign: "center", marginBottom: "30px", color: "#E8E6E1" }}>D-Ploeg Buiten</h1>
                        <form onSubmit={handleLogin} style={{ background: "#16181D", padding: "30px", borderRadius: "12px", border: "1px solid #262A33" }}>
                            <div style={{ marginBottom: "20px" }}>
                                <input
                                    type="text"
                                    placeholder="Gebruikersnaam"
                                    value={gebruikersnaam}
                                    onChange={(e) => setGebruikersnaam(e.target.value)}
                                    style={{ width: "100%", padding: "12px", borderRadius: "8px", border: "1px solid #262A33", background: "#0f0f12", color: "#E8E6E1", fontSize: "16px" }}
                                />
                            </div>
                            <div style={{ marginBottom: "20px" }}>
                                <input
                                    type="password"
                                    placeholder="Wachtwoord"
                                    value={wachtwoord}
                                    onChange={(e) => setWachtwoord(e.target.value)}
                                    style={{ width: "100%", padding: "12px", borderRadius: "8px", border: "1px solid #262A33", background: "#0f0f12", color: "#E8E6E1", fontSize: "16px" }}
                                />
                            </div>
                            {error && <div style={{ color: "#ef4444", marginBottom: "15px", fontSize: "14px" }}>{error}</div>}
                            <button
                                type="submit"
                                style={{ width: "100%", padding: "12px", background: "#3b82f6", color: "white", border: "none", borderRadius: "8px", fontSize: "16px", fontWeight: "bold", cursor: "pointer" }}
                            >
                                Inloggen
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function AdminApp({ api }) {
            const [personen, setPersonen] = React.useState([]);
            const [diensten, setDiensten] = React.useState([]);
            const [view, setView] = React.useState("dashboard");
            const [modalOpen, setModalOpen] = React.useState(false);
            const [modalType, setModalType] = React.useState("");
            const [newPerson, setNewPerson] = React.useState("");
            const [selectedDate, setSelectedDate] = React.useState("");
            const [selectedPeriod, setSelectedPeriod] = React.useState({ van: "", tot: "", interval: 1 });
            const [weer, setWeer] = React.useState({});
            const [theme, setTheme] = React.useState(() => localStorage.getItem("theme") || "dark");

            React.useEffect(() => {
                loadData();
                loadWeer();
                const interval = setInterval(loadWeer, 3600000);
                return () => clearInterval(interval);
            }, []);

            const loadData = async () => {
                try {
                    const pRes = await api.call("/api/personen");
                    const dRes = await api.call("/api/diensten");
                    setPersonen(pRes.personen || []);
                    setDiensten(dRes.diensten || []);
                } catch (err) {
                    console.error(err);
                }
            };

            const loadWeer = async () => {
                try {
                    const res = await fetch(WEER_API);
                    const data = await res.json();
                    setWeer(data);
                } catch (err) {
                    console.error("Weer laden mislukt", err);
                }
            };

            const addPerson = async () => {
                if (!newPerson.trim()) return;
                try {
                    await api.call("/api/personen", { method: "POST", body: JSON.stringify({ naam: newPerson }) });
                    setNewPerson("");
                    loadData();
                    setModalOpen(false);
                } catch (err) {
                    alert("Fout: " + err.message);
                }
            };

            const deletePerson = async (id) => {
                if (confirm("Zeker?")) {
                    try {
                        await api.call(`/api/personen/${id}`, { method: "DELETE" });
                        loadData();
                    } catch (err) {
                        alert("Fout: " + err.message);
                    }
                }
            };

            const addDienst = async () => {
                if (!selectedDate) return;
                try {
                    await api.call("/api/diensten", { method: "POST", body: JSON.stringify({ datum: selectedDate }) });
                    setSelectedDate("");
                    loadData();
                    setModalOpen(false);
                } catch (err) {
                    alert("Fout: " + err.message);
                }
            };

            const addPeriode = async () => {
                if (!selectedPeriod.van || !selectedPeriod.tot) return;
                try {
                    await api.call("/api/diensten/periode", { method: "POST", body: JSON.stringify(selectedPeriod) });
                    setSelectedPeriod({ van: "", tot: "", interval: 1 });
                    loadData();
                    setModalOpen(false);
                } catch (err) {
                    alert("Fout: " + err.message);
                }
            };

            const indelen = async (dienstId) => {
                try {
                    await api.call(`/api/diensten/${dienstId}/indelen`, { method: "POST" });
                    loadData();
                } catch (err) {
                    alert("Fout: " + err.message);
                }
            };

            const indelenAlles = async () => {
                try {
                    await api.call("/api/diensten/indelen-alles", { method: "POST" });
                    loadData();
                } catch (err) {
                    alert("Fout: " + err.message);
                }
            };

            return (
                <div style={{ minHeight: "100vh", background: "#0f0f12", padding: "20px" }}>
                    <div style={{ maxWidth: "1200px", margin: "0 auto" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "30px" }}>
                            <div>
                                <h1 style={{ color: "#E8E6E1", marginBottom: "5px" }}>D-Ploeg Buiten</h1>
                                <div style={{ fontSize: "14px", color: "#8a8f9c" }}>Rooster Management</div>
                            </div>
                            <button
                                onClick={() => {
                                    sessionStorage.removeItem("rooster_token");
                                    api.setToken(null);
                                }}
                                style={{ padding: "8px 16px", background: "#ef4444", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}
                            >
                                Uitloggen
                            </button>
                        </div>

                        <div style={{ display: "flex", gap: "10px", marginBottom: "30px", flexWrap: "wrap" }}>
                            {["dashboard", "personen", "diensten"].map((v) => (
                                <button
                                    key={v}
                                    onClick={() => setView(v)}
                                    style={{
                                        padding: "10px 20px",
                                        background: view === v ? "#3b82f6" : "#16181D",
                                        color: "#E8E6E1",
                                        border: "1px solid #262A33",
                                        borderRadius: "6px",
                                        cursor: "pointer",
                                        fontWeight: view === v ? "bold" : "normal",
                                    }}
                                >
                                    {v.charAt(0).toUpperCase() + v.slice(1)}
                                </button>
                            ))}
                        </div>

                        {view === "dashboard" && (
                            <div>
                                <h2 style={{ color: "#E8E6E1", marginBottom: "20px" }}>Dashboard</h2>
                                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: "20px" }}>
                                    <div style={{ background: "#16181D", padding: "20px", borderRadius: "10px", border: "1px solid #262A33" }}>
                                        <div style={{ fontSize: "14px", color: "#8a8f9c", marginBottom: "10px" }}>Totaal personen</div>
                                        <div style={{ fontSize: "32px", fontWeight: "bold", color: "#E8E6E1" }}>{personen.length}</div>
                                    </div>
                                    <div style={{ background: "#16181D", padding: "20px", borderRadius: "10px", border: "1px solid #262A33" }}>
                                        <div style={{ fontSize: "14px", color: "#8a8f9c", marginBottom: "10px" }}>Geplande diensten</div>
                                        <div style={{ fontSize: "32px", fontWeight: "bold", color: "#E8E6E1" }}>{diensten.length}</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === "personen" && (
                            <div>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
                                    <h2 style={{ color: "#E8E6E1" }}>Personen</h2>
                                    <button
                                        onClick={() => {
                                            setModalType("persoon");
                                            setModalOpen(true);
                                        }}
                                        style={{ padding: "10px 20px", background: "#3b82f6", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}
                                    >
                                        + Toevoegen
                                    </button>
                                </div>
                                <div style={{ display: "grid", gap: "10px" }}>
                                    {personen.map((p) => (
                                        <div key={p.id} style={{ background: "#16181D", padding: "15px", borderRadius: "8px", border: "1px solid #262A33", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                            <div>
                                                <div style={{ color: "#E8E6E1", fontWeight: "bold" }}>{p.naam}</div>
                                            </div>
                                            <button
                                                onClick={() => deletePerson(p.id)}
                                                style={{ padding: "6px 12px", background: "#ef4444", color: "white", border: "none", borderRadius: "4px", cursor: "pointer", fontSize: "12px" }}
                                            >
                                                Verwijderen
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === "diensten" && (
                            <div>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
                                    <h2 style={{ color: "#E8E6E1" }}>Diensten</h2>
                                    <div style={{ display: "flex", gap: "10px" }}>
                                        <button
                                            onClick={() => {
                                                setModalType("dienst");
                                                setModalOpen(true);
                                            }}
                                            style={{ padding: "10px 20px", background: "#3b82f6", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}
                                        >
                                            + Dienst
                                        </button>
                                        <button
                                            onClick={() => {
                                                setModalType("periode");
                                                setModalOpen(true);
                                            }}
                                            style={{ padding: "10px 20px", background: "#10b981", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}
                                        >
                                            + Periode
                                        </button>
                                        <button
                                            onClick={indelenAlles}
                                            style={{ padding: "10px 20px", background: "#f59e0b", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}
                                        >
                                            Indelen (alles)
                                        </button>
                                    </div>
                                </div>
                                <div style={{ display: "grid", gap: "10px" }}>
                                    {diensten.map((d) => (
                                        <div key={d.id} style={{ background: "#16181D", padding: "15px", borderRadius: "8px", border: "1px solid #262A33" }}>
                                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
                                                <div style={{ color: "#E8E6E1", fontWeight: "bold" }}>{d.datum}</div>
                                                <button
                                                    onClick={() => indelen(d.id)}
                                                    style={{ padding: "6px 12px", background: "#10b981", color: "white", border: "none", borderRadius: "4px", cursor: "pointer", fontSize: "12px" }}
                                                >
                                                    Indelen
                                                </button>
                                            </div>
                                            {d.tekorten.length > 0 && <div style={{ fontSize: "12px", color: "#ef4444" }}>Tekort: {d.tekorten.join(", ")}</div>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {modalOpen && (
                            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px", zIndex: 1000 }}>
                                <div style={{ background: "#16181D", padding: "30px", borderRadius: "12px", border: "1px solid #262A33", width: "100%", maxWidth: "400px" }}>
                                    <h2 style={{ color: "#E8E6E1", marginBottom: "20px" }}>
                                        {modalType === "persoon" && "Persoon toevoegen"}
                                        {modalType === "dienst" && "Dienst toevoegen"}
                                        {modalType === "periode" && "Periode toevoegen"}
                                    </h2>

                                    {modalType === "persoon" && (
                                        <>
                                            <input
                                                type="text"
                                                placeholder="Naam"
                                                value={newPerson}
                                                onChange={(e) => setNewPerson(e.target.value)}
                                                style={{ width: "100%", padding: "10px", marginBottom: "15px", borderRadius: "6px", border: "1px solid #262A33", background: "#0f0f12", color: "#E8E6E1" }}
                                            />
                                            <div style={{ display: "flex", gap: "10px" }}>
                                                <button onClick={addPerson} style={{ flex: 1, padding: "10px", background: "#3b82f6", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}>
                                                    Toevoegen
                                                </button>
                                                <button onClick={() => setModalOpen(false)} style={{ flex: 1, padding: "10px", background: "#6b7280", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}>
                                                    Annuleren
                                                </button>
                                            </div>
                                        </>
                                    )}

                                    {modalType === "dienst" && (
                                        <>
                                            <input
                                                type="date"
                                                value={selectedDate}
                                                onChange={(e) => setSelectedDate(e.target.value)}
                                                style={{ width: "100%", padding: "10px", marginBottom: "15px", borderRadius: "6px", border: "1px solid #262A33", background: "#0f0f12", color: "#E8E6E1" }}
                                            />
                                            <div style={{ display: "flex", gap: "10px" }}>
                                                <button onClick={addDienst} style={{ flex: 1, padding: "10px", background: "#3b82f6", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}>
                                                    Toevoegen
                                                </button>
                                                <button onClick={() => setModalOpen(false)} style={{ flex: 1, padding: "10px", background: "#6b7280", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}>
                                                    Annuleren
                                                </button>
                                            </div>
                                        </>
                                    )}

                                    {modalType === "periode" && (
                                        <>
                                            <input
                                                type="date"
                                                placeholder="Van"
                                                value={selectedPeriod.van}
                                                onChange={(e) => setSelectedPeriod({ ...selectedPeriod, van: e.target.value })}
                                                style={{ width: "100%", padding: "10px", marginBottom: "10px", borderRadius: "6px", border: "1px solid #262A33", background: "#0f0f12", color: "#E8E6E1" }}
                                            />
                                            <input
                                                type="date"
                                                placeholder="Tot"
                                                value={selectedPeriod.tot}
                                                onChange={(e) => setSelectedPeriod({ ...selectedPeriod, tot: e.target.value })}
                                                style={{ width: "100%", padding: "10px", marginBottom: "10px", borderRadius: "6px", border: "1px solid #262A33", background: "#0f0f12", color: "#E8E6E1" }}
                                            />
                                            <input
                                                type="number"
                                                placeholder="Interval (dagen)"
                                                value={selectedPeriod.interval}
                                                onChange={(e) => setSelectedPeriod({ ...selectedPeriod, interval: parseInt(e.target.value) || 1 })}
                                                style={{ width: "100%", padding: "10px", marginBottom: "15px", borderRadius: "6px", border: "1px solid #262A33", background: "#0f0f12", color: "#E8E6E1" }}
                                            />
                                            <div style={{ display: "flex", gap: "10px" }}>
                                                <button onClick={addPeriode} style={{ flex: 1, padding: "10px", background: "#3b82f6", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}>
                                                    Toevoegen
                                                </button>
                                                <button onClick={() => setModalOpen(false)} style={{ flex: 1, padding: "10px", background: "#6b7280", color: "white", border: "none", borderRadius: "6px", cursor: "pointer" }}>
                                                    Annuleren
                                                </button>
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function GastWeergave() {
            const [rooster, setRooster] = React.useState(null);
            const api = useApi();

            React.useEffect(() => {
                const loadRooster = async () => {
                    try {
                        const res = await api.call("/api/rooster");
                        setRooster(res);
                    } catch (err) {
                        console.error("Fout bij laden rooster:", err);
                    }
                };
                if (api.token) loadRooster();
            }, [api.token]);

            return (
                <div style={{ minHeight: "100vh", background: "#0f0f12", padding: "20px" }}>
                    <div style={{ maxWidth: "1200px", margin: "0 auto" }}>
                        <h1 style={{ color: "#E8E6E1", marginBottom: "30px" }}>D-Ploeg Buiten — Rooster</h1>
                        {rooster ? (
                            <>
                                <h2 style={{ color: "#8a8f9c", marginBottom: "15px" }}>Diensten</h2>
                                <div style={{ display: "grid", gap: "10px" }}>
                                    {rooster.diensten.map((d) => (
                                        <div key={d.id} style={{ background: "#16181D", padding: "15px", borderRadius: "8px", border: "1px solid #262A33" }}>
                                            <div style={{ color: "#E8E6E1", fontWeight: "bold", marginBottom: "10px" }}>{d.datum}</div>
                                            {d.toewijzing ? (
                                                <div>
                                                    {["B", "M", "CTS", "CL", "OL"].map((f) => {
                                                        const persoonIds = d.toewijzing[f] || [];
                                                        const labels = persoonIds.map((pid) => {
                                                            const p = rooster.personen.find((x) => x.id === pid);
                                                            return p ? p.naam : pid;
                                                        });
                                                        return (
                                                            <div key={f} style={{ fontSize: "12px", color: "#8a8f9c", marginBottom: "5px" }}>
                                                                <strong style={{ color: "#E8E6E1" }}>{f}:</strong> {labels.join(", ") || "—"}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ) : (
                                                <div style={{ fontSize: "12px", color: "#6b7280" }}>Nog niet ingedeeld</div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div style={{ color: "#8a8f9c" }}>Rooster laden...</div>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const api = useApi();
            return api.token ? <AdminApp api={api} /> : <LoginScreen api={api} onSuccess={() => {}} />;
        }

        ReactDOM.render(<App />, document.getElementById("root"));
    </script>
</body>
</html>
